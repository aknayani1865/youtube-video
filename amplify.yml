version: 1
applications:
  - appRoot: artifacts/landing-site
    frontend:
      phases:
        preBuild:
          commands:
            - cd ../..
            - corepack enable
            - corepack prepare pnpm@10.24.0 --activate
            - pnpm install --frozen-lockfile --ignore-scripts
        build:
          commands:
            - pnpm --filter @workspace/landing-site run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - ../../.pnpm-store/**/*
